<!DOCTYPE html>
<html>
<head><title>Signing in…</title></head>
<body>
<p style="font-family:sans-serif;padding:20px;color:#555">Signing in, please wait…</p>
<script>
  const query = {};
  window.location.search.substring(1).split('&').forEach(p => {
    const [k, v] = p.split('=');
    if (k) query[decodeURIComponent(k)] = decodeURIComponent(v || '');
  });
  const target = window.opener || (window.parent !== window ? window.parent : null);
  if (target) {
    target.postMessage(query, 'https://zacharypals.github.io');
    if (window.opener) window.close();
  } else {
    document.body.innerHTML = '<p style="font-family:sans-serif;padding:20px;color:#c00">Sign-in failed. Please close this window and try again.</p>';
  }
</script>
</body>
</html>
